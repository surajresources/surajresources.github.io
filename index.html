<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suraj's Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#f4f1eb; --surface:#fff; --border:#e0dbd0; --border2:#ccc8be;
  --text:#1a1814; --muted:#8a8478; --tag:#e8e4dc; --del:#c0392b; --green:#2d6a4f;
  --font-d:'Syne',sans-serif; --font-m:'JetBrains Mono',monospace; --font-b:'Lato',sans-serif;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}

header{background:var(--text);color:var(--bg);padding:22px 36px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.site-name{font-family:var(--font-d);font-size:20px;font-weight:800;letter-spacing:-.02em;}
.site-name em{font-style:normal;opacity:.4;font-weight:400;font-size:13px;margin-left:10px;}
.sync-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border-radius:20px;padding:5px 12px;font-family:var(--font-m);font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.06em;white-space:nowrap;}
.sd{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0;transition:background .3s;}
.sd.ok{background:#5dbb7a;} .sd.err{background:#e05a5a;} .sd.busy{background:#f0c040;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.type-bar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 36px;display:flex;align-items:stretch;}
.tt{padding:14px 22px 12px;font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;user-select:none;display:flex;align-items:center;gap:8px;}
.tt:hover{color:var(--text);}
.tt.on{color:var(--text);border-bottom-color:var(--text);}
.tt-n{font-family:var(--font-m);font-size:11px;background:var(--tag);border-radius:20px;padding:1px 7px;color:var(--muted);font-weight:400;}
.tt.on .tt-n{background:var(--text);color:var(--bg);}
.tt-bin{margin-left:auto;}
.tt-bin.on{color:var(--del);border-bottom-color:var(--del);}
.tt-bin .tt-n{background:#fdecea;color:var(--del);}
.tt-bin.on .tt-n{background:var(--del);color:#fff;}

.page{max-width:760px;margin:0 auto;padding:28px 36px 60px;}
@media(max-width:600px){.page{padding:18px 14px 60px;}header{padding:18px 14px;}.type-bar{padding:0 10px;}}

/* chips */
.chips{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:24px;min-height:32px;}
.chip{font-family:var(--font-m);font-size:11px;padding:6px 13px;border-radius:20px;background:var(--surface);border:1.5px solid var(--border2);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.chip:hover{border-color:var(--text);color:var(--text);}
.chip.on{background:var(--text);border-color:var(--text);color:var(--bg);}
.chip-c{font-size:10px;opacity:.6;}
.chip-acts{display:none;gap:3px;margin-left:3px;}
.chip:hover .chip-acts,.chip.on .chip-acts{display:flex;}
.cbtn{background:none;border:none;cursor:pointer;font-size:11px;line-height:1;opacity:.5;transition:opacity .12s;color:inherit;padding:0 1px;}
.chip-name{cursor:text;border-bottom:1px dashed transparent;transition:border-color .15s;}
.chip:hover .chip-name,.chip.on .chip-name{border-bottom-color:currentColor;}
.cbtn:hover{opacity:1;}
.cbtn.x:hover{color:var(--del);opacity:1;}
.chip-ef{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--surface);border:1.5px solid var(--text);}
.chip-ef input{font-family:var(--font-m);font-size:11px;border:none;outline:none;background:transparent;color:var(--text);width:120px;}
.chip-ef button{font-family:var(--font-m);font-size:10px;padding:2px 9px;border-radius:10px;border:none;background:var(--text);color:var(--bg);cursor:pointer;}
.chip-new{font-family:var(--font-m);font-size:11px;padding:6px 13px;border-radius:20px;background:transparent;border:1.5px dashed var(--border2);color:var(--muted);cursor:pointer;transition:all .15s;}
.chip-new:hover{border-color:var(--text);color:var(--text);}
.nc-form{display:flex;align-items:center;gap:6px;}
.nc-form input{font-family:var(--font-m);font-size:11px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--text);background:var(--surface);color:var(--text);outline:none;width:150px;}
.nc-form button{font-family:var(--font-m);font-size:11px;padding:5px 12px;border-radius:20px;border:none;background:var(--text);color:var(--bg);cursor:pointer;}

/* add form */
.add-form{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:28px;}
.form-meta{font-family:var(--font-m);font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.form-meta .badge{background:var(--text);color:var(--bg);border-radius:4px;padding:2px 8px;font-size:10px;letter-spacing:.08em;}
.form-meta .into strong{color:var(--text);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:480px){.fgrid{grid-template-columns:1fr;}}
.fi{font-size:14px;padding:10px 13px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;width:100%;font-family:var(--font-b);}
.fi:focus{border-color:var(--text);}
.fi::placeholder{color:var(--muted);}
textarea.fi{resize:vertical;min-height:68px;line-height:1.5;font-size:13px;}
.form-foot{display:flex;justify-content:flex-end;margin-top:12px;}
.btn-add{font-family:var(--font-d);font-size:14px;font-weight:700;padding:10px 30px;background:var(--text);color:var(--bg);border:none;border-radius:7px;cursor:pointer;transition:opacity .15s,transform .1s;}
.btn-add:hover{opacity:.8;} .btn-add:active{transform:scale(.97);}

/* list header */
.lh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.lt{font-family:var(--font-d);font-size:19px;font-weight:800;letter-spacing:-.01em;}
.lc{font-family:var(--font-m);font-size:11px;color:var(--muted);}
.btn-empty{font-family:var(--font-m);font-size:11px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--del);background:none;color:var(--del);cursor:pointer;transition:all .15s;}
.btn-empty:hover{background:var(--del);color:#fff;}
.btn-copy-all{font-family:var(--font-m);font-size:11px;padding:6px 16px;border-radius:20px;border:none;background:var(--text);color:var(--bg);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.btn-copy-all:hover{opacity:.75;}
.btn-copy-all.copied{background:var(--green);}

/* entry card */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 16px 14px 18px;margin-bottom:10px;animation:pop .18s ease;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card-row{display:flex;gap:12px;align-items:flex-start;}
.card-body{flex:1;min-width:0;}
.card-title{font-family:var(--font-d);font-size:16px;font-weight:700;line-height:1.25;margin-bottom:3px;word-break:break-word;}
.card-title a{color:var(--text);text-decoration:none;}
.card-title a:hover{text-decoration:underline;text-underline-offset:3px;}
.card-url{font-family:var(--font-m);font-size:11px;color:var(--muted);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-url a{color:var(--muted);text-decoration:none;}
.card-url a:hover{color:var(--text);}
.card-notes{font-size:13px;color:#555;line-height:1.55;white-space:pre-wrap;margin-bottom:7px;}
.card-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px;}
.card-date{font-family:var(--font-m);font-size:10px;color:var(--muted);}
.card-tag{font-family:var(--font-m);font-size:10px;background:var(--tag);border-radius:20px;padding:2px 9px;color:var(--muted);}

/* card action buttons */
.card-acts{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.ca{width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1;}
.ca:hover{border-color:var(--border2);color:var(--text);background:var(--tag);}
.ca.red:hover{background:#fdecea;border-color:var(--del);color:var(--del);}
.ca.grn:hover{background:#e8f5e9;border-color:var(--green);color:var(--green);}
.ca.copied{border-color:var(--green)!important;color:var(--green)!important;background:#e8f5e9!important;}

/* inline edit */
.card-edit{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.card-edit.open{display:block;}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
@media(max-width:480px){.eg{grid-template-columns:1fr;}}
.ei{font-size:13px;padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;width:100%;font-family:var(--font-b);transition:border-color .15s;}
.ei:focus{border-color:var(--text);}
textarea.ei{resize:vertical;min-height:56px;line-height:1.5;}
.ef{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-sv{font-family:var(--font-m);font-size:11px;padding:6px 18px;border-radius:6px;border:none;background:var(--text);color:var(--bg);cursor:pointer;}
.btn-cx{font-family:var(--font-m);font-size:11px;padding:6px 14px;border-radius:6px;border:1.5px solid var(--border);background:none;color:var(--muted);cursor:pointer;}

.empty{text-align:center;padding:56px 0;color:var(--muted);font-family:var(--font-m);font-size:12px;letter-spacing:.04em;}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);font-family:var(--font-m);font-size:12px;padding:9px 20px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="site-name">Suraj's Resources <em>surajresources.github.io</em></div>
  <div class="sync-pill"><span class="sd busy" id="sd"></span><span id="sl">connecting…</span></div>
</header>

<div class="type-bar">
  <div class="tt on" id="tt-watch">📺 Watch <span class="tt-n" id="tc-watch">0</span></div>
  <div class="tt"    id="tt-read" >📖 Read  <span class="tt-n" id="tc-read">0</span></div>
  <div class="tt tt-bin" id="tt-bin">🗑 Bin <span class="tt-n" id="tc-bin">0</span></div>
</div>

<div class="page">
  <div id="chips" class="chips"></div>
  <div id="add-wrap">
    <div class="add-form">
      <div class="form-meta">
        <span class="badge" id="form-badge">WATCH</span>
        <span class="into">Adding to: <strong id="form-dest">All</strong></span>
      </div>
      <div class="fgrid">
        <input class="fi" id="f-title" placeholder="Title…">
        <input class="fi" id="f-link" type="url" placeholder="https://… (optional)">
      </div>
      <textarea class="fi" id="f-notes" placeholder="Notes, why it's useful… (optional)"></textarea>
      <div class="form-foot"><button class="btn-add" id="btn-add">Add ↵</button></div>
    </div>
  </div>
  <div class="lh">
    <div class="lt" id="lt"></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="lc" id="lc"></div>
      <button class="btn-copy-all" id="btn-copy-all" style="display:none">📋 Copy All</button>
      <button class="btn-empty" id="btn-empty" style="display:none">Empty Bin</button>
    </div>
  </div>
  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
var FB_CONFIG = {
  apiKey:"AIzaSyDis3Ub3MAMWceOG3zYPczKzl-ncNSEgGE",
  authDomain:"surajrm.firebaseapp.com",
  projectId:"surajrm",
  storageBucket:"surajrm.firebasestorage.app",
  messagingSenderId:"623228884068",
  appId:"1:623228884068:web:67e848a3a1730c35f4bb71"
};

var LS='suraj_v7';
var S={ entries:[], deleted:[], deletedGroups:[], groups:{ watch:[{id:'w0',name:'All',emoji:'📋'}], read:[{id:'r0',name:'All',emoji:'📋'}] } };
var ui={ tab:'watch', active:{watch:'w0',read:'r0'}, newGrp:false, editGrp:null, editEntry:null };

function loadLocal(){
  try{var d=JSON.parse(localStorage.getItem(LS)||'{}');if(d.entries)S.entries=d.entries;if(d.deleted)S.deleted=d.deleted;if(d.deletedGroups)S.deletedGroups=d.deletedGroups;if(d.groups)S.groups=d.groups;if(d.active)ui.active=d.active;}catch(e){}
}
function saveLocal(){
  try{localStorage.setItem(LS,JSON.stringify({entries:S.entries,deleted:S.deleted,deletedGroups:S.deletedGroups,groups:S.groups,active:ui.active}));}catch(e){}
}
function setSync(s,m){document.getElementById('sd').className='sd '+s;document.getElementById('sl').textContent=m;}

var fbSave=null;
var ct=setTimeout(function(){setSync('err','local only');},8000);
try{
  firebase.initializeApp(FB_CONFIG);
  var db=firebase.firestore();
  var ref=db.collection('resources').doc('main');
  ref.onSnapshot(function(snap){
    clearTimeout(ct);
    if(snap.exists){var d=snap.data();S.entries=d.entries||[];S.deleted=d.deleted||[];S.deletedGroups=d.deletedGroups||[];if(d.groups)S.groups=d.groups;saveLocal();}
    setSync('ok','synced ✓');renderAll();
  },function(err){clearTimeout(ct);console.error(err);setSync('err','offline');});
  fbSave=function(){
    setSync('busy','saving…');
    ref.set({entries:S.entries,deleted:S.deleted,deletedGroups:S.deletedGroups,groups:S.groups})
      .then(function(){setSync('ok','synced ✓');})
      .catch(function(e){console.error(e);setSync('err','save failed');});
  };
}catch(e){clearTimeout(ct);setSync('err','firebase error');}

function persist(){saveLocal();if(fbSave)fbSave();}

var toastT;
function toast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},2000);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function trimUrl(u){var s=u.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'');return s.length>54?s.slice(0,54)+'…':s;}
function defId(t){return t==='watch'?'w0':'r0';}
function today(){return new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

// ── Groups ────────────────────────────────────────────
var WE=['🎬','🎞','📽','🍿','🎦','▶️','🎥'];
var RE=['📁','📂','🗂','📌','🔖','💡','📝'];

function addGroup(name){
  var t=ui.tab==='bin'?'watch':ui.tab;
  var id=t[0]+'_'+Date.now();
  var pool=t==='watch'?WE:RE;
  S.groups[t].push({id:id,name:name,emoji:pool[Math.floor(Math.random()*pool.length)]});
  ui.active[t]=id;ui.newGrp=false;persist();renderAll();
}
function renameGroup(t,id,name){
  var g=S.groups[t].find(function(g){return g.id===id;});
  if(g&&name.trim())g.name=name.trim();
  ui.editGrp=null;persist();renderAll();
}
function deleteGroup(t,id){
  var def=defId(t);
  var g=S.groups[t].find(function(g){return g.id===id;});
  if(!g)return;
  // soft-delete: save group + its entries to deletedGroups
  var itsEntries=S.entries.filter(function(e){return e.type===t&&e.gid===id;});
  S.deletedGroups.unshift({group:g,type:t,entries:itsEntries,deletedAt:today()});
  // move entries to All temporarily so they don't vanish
  S.entries.forEach(function(e){if(e.type===t&&e.gid===id)e.gid=def;});
  S.groups[t]=S.groups[t].filter(function(g){return g.id!==id;});
  if(ui.active[t]===id)ui.active[t]=def;
  persist();renderAll();toast('Folder moved to bin');
}

function restoreGroup(idx){
  var dg=S.deletedGroups[idx];if(!dg)return;
  S.deletedGroups.splice(idx,1);
  // re-add group
  S.groups[dg.type].push(dg.group);
  // move entries back (currently sitting in All with same gid)
  // some may have been deleted since — just restore the ones still in All
  dg.entries.forEach(function(saved){
    var live=S.entries.find(function(e){return e.id===saved.id;});
    if(live)live.gid=dg.group.id;
  });
  ui.active[dg.type]=dg.group.id;
  // switch to the tab where the folder was restored so user can see it
  ui.tab=dg.type;
  document.getElementById('tt-watch').className='tt'+(dg.type==='watch'?' on':'');
  document.getElementById('tt-read').className='tt'+(dg.type==='read'?' on':'');
  document.getElementById('tt-bin').className='tt tt-bin';
  document.getElementById('form-badge').textContent=dg.type.toUpperCase();
  persist();renderAll();toast('Folder restored ✓');
}
function emptyGroupBin(){
  if(!S.deletedGroups.length)return;
  if(!confirm('Permanently delete '+S.deletedGroups.length+' folder(s) from bin?'))return;
  S.deletedGroups=[];persist();renderAll();toast('Folder bin emptied');
}
// ── Entries ───────────────────────────────────────────
function addEntry(){
  var title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  var t=ui.tab==='bin'?'watch':ui.tab;
  S.entries.unshift({id:Date.now(),title:title,link:document.getElementById('f-link').value.trim(),notes:document.getElementById('f-notes').value.trim(),type:t,gid:ui.active[t],date:today()});
  document.getElementById('f-title').value='';document.getElementById('f-link').value='';document.getElementById('f-notes').value='';
  persist();renderAll();
}
function saveEntry(id){
  var e=S.entries.find(function(e){return e.id===id;});if(!e)return;
  var t=document.getElementById('ei-t-'+id).value.trim();if(t)e.title=t;
  e.link=document.getElementById('ei-l-'+id).value.trim();
  e.notes=document.getElementById('ei-n-'+id).value.trim();
  ui.editEntry=null;persist();renderAll();toast('Saved ✓');
}
function softDelete(id){
  var i=S.entries.findIndex(function(e){return e.id===id;});if(i===-1)return;
  var e=S.entries.splice(i,1)[0];e.deletedAt=today();S.deleted.unshift(e);
  persist();renderAll();toast('Moved to bin');
}
function restore(id){
  var i=S.deleted.findIndex(function(e){return e.id===id;});if(i===-1)return;
  var e=S.deleted.splice(i,1)[0];delete e.deletedAt;
  var gs=S.groups[e.type]||[];if(!gs.find(function(g){return g.id===e.gid;}))e.gid=defId(e.type);
  S.entries.unshift(e);persist();renderAll();toast('Restored ✓');
}
function emptyBin(){
  if(!S.deleted.length)return;
  if(!confirm('Permanently delete all '+S.deleted.length+' item(s)?'))return;
  S.deleted=[];S.deletedGroups=[];persist();renderAll();toast('Bin emptied');
}
function copyAll(){
  var isBin=ui.tab==='bin';
  var t=isBin?'watch':ui.tab,gid=ui.active[t],def=defId(t),isAll=gid===def;
  var rows=isBin?S.deleted:(isAll?S.entries.filter(function(e){return e.type===t;}):S.entries.filter(function(e){return e.type===t&&e.gid===gid;}));
  if(!rows.length){toast('Nothing to copy');return;}
  var text=rows.map(function(e,i){
    var line=(i+1)+'. '+e.title;
    if(e.link)line+='\n   '+e.link;
    if(e.notes)line+='\n   '+e.notes;
    return line;
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(function(){
    toast('Copied '+rows.length+' item'+(rows.length!==1?'s':'')+'!');
    var b=document.getElementById('btn-copy-all');
    if(b){b.textContent='✓ Copied';b.classList.add('copied');setTimeout(function(){b.textContent='📋 Copy All';b.classList.remove('copied');},1500);}
  }).catch(function(){toast('Copy failed');});
}
function copyEntry(id){
  var e=S.entries.find(function(e){return e.id===id;});if(!e)return;
  var txt=e.title+(e.link?'\n'+e.link:'')+(e.notes?'\n'+e.notes:'');
  navigator.clipboard.writeText(txt).then(function(){
    toast('Copied!');
    var b=document.getElementById('ca-c-'+id);
    if(b){b.classList.add('copied');setTimeout(function(){b.classList.remove('copied');},1500);}
  }).catch(function(){toast('Copy failed');});
}

// ── Tab ───────────────────────────────────────────────
function switchTab(t){
  ui.tab=t;ui.newGrp=false;ui.editGrp=null;ui.editEntry=null;
  document.getElementById('tt-watch').className='tt'+(t==='watch'?' on':'');
  document.getElementById('tt-read').className='tt'+(t==='read'?' on':'');
  document.getElementById('tt-bin').className='tt tt-bin'+(t==='bin'?' on':'');
  if(t!=='bin')document.getElementById('form-badge').textContent=t.toUpperCase();
  renderAll();
}
function selGroup(t,id){
  ui.active[t]=id;ui.editGrp=null;ui.newGrp=false;
  if(ui.tab!==t){
    ui.tab=t;
    document.getElementById('tt-watch').className='tt'+(t==='watch'?' on':'');
    document.getElementById('tt-read').className='tt'+(t==='read'?' on':'');
    document.getElementById('tt-bin').className='tt tt-bin';
    document.getElementById('form-badge').textContent=t.toUpperCase();
  }
  renderAll();
}

// ── Render chips ──────────────────────────────────────
function renderChips(){
  var isBin=ui.tab==='bin';
  document.getElementById('add-wrap').style.display=isBin?'none':'';
  var el=document.getElementById('chips');
  if(isBin){el.innerHTML='';return;}
  var t=ui.tab,def=defId(t),html='';
  (S.groups[t]||[]).forEach(function(g){
    var cnt=g.id===def?S.entries.filter(function(e){return e.type===t;}).length:S.entries.filter(function(e){return e.type===t&&e.gid===g.id;}).length;
    var on=ui.active[t]===g.id?' on':'';
    if(ui.editGrp===g.id){
      html+='<div class="chip-ef" id="cef-'+g.id+'"><input id="cei-'+g.id+'" value="'+esc(g.name)+'" maxlength="36"><button id="ces-'+g.id+'">Save</button></div>';
    } else {
      var ea=g.id!==def?'<button class="cbtn" data-act="egrp" data-t="'+t+'" data-id="'+g.id+'" title="Rename">✏️</button>':'';
      var da=g.id!==def?'<button class="cbtn x" data-act="dgrp" data-t="'+t+'" data-id="'+g.id+'" title="Delete">✕</button>':'';
      html+='<div class="chip'+on+'" data-act="sgrp" data-t="'+t+'" data-id="'+g.id+'">'+g.emoji+' <span class="chip-name" data-act="egrp" data-t="'+t+'" data-id="'+g.id+'" title="Double-click to rename">'+esc(g.name)+'</span> <span class="chip-c">'+cnt+'</span><span class="chip-acts">'+ea+da+'</span></div>';
    }
  });
  if(!ui.newGrp){
    html+='<button class="chip-new" id="btn-nc">+ New '+(t==='watch'?'Playlist':'Folder')+'</button>';
  } else {
    html+='<div class="nc-form"><input id="nc-inp" placeholder="'+(t==='watch'?'Playlist':'Folder')+' name…" maxlength="36"><button id="nc-ok">Add</button></div>';
  }
  el.innerHTML=html;
  // bind chip edit
  (S.groups[t]||[]).forEach(function(g){
    if(ui.editGrp===g.id){
      var inp=document.getElementById('cei-'+g.id);var sav=document.getElementById('ces-'+g.id);
      if(inp){inp.focus();inp.select();}
      if(sav)sav.onclick=function(){renameGroup(t,g.id,inp.value);};
      if(inp)inp.onkeydown=function(e){if(e.key==='Enter')renameGroup(t,g.id,inp.value);if(e.key==='Escape'){ui.editGrp=null;renderChips();}};
    }
  });
  if(ui.newGrp){
    var ni=document.getElementById('nc-inp');if(ni){ni.focus();
      document.getElementById('nc-ok').onclick=function(){var v=ni.value.trim();if(v)addGroup(v);};
      ni.onkeydown=function(e){if(e.key==='Enter'){var v=ni.value.trim();if(v)addGroup(v);}if(e.key==='Escape'){ui.newGrp=false;renderChips();}};
    }
  }
  var act=(S.groups[t]||[]).find(function(g){return g.id===ui.active[t];});
  document.getElementById('form-dest').textContent=act?act.name:'All';
}

// ── Render list ───────────────────────────────────────
function renderList(){
  var isBin=ui.tab==='bin';
  var t=isBin?'watch':ui.tab,gid=ui.active[t],def=defId(t),isAll=gid===def||isBin;
  var rows=isBin?S.deleted:(isAll?S.entries.filter(function(e){return e.type===t;}):S.entries.filter(function(e){return e.type===t&&e.gid===gid;}));

  document.getElementById('tc-watch').textContent=S.entries.filter(function(e){return e.type==='watch';}).length;
  document.getElementById('tc-read').textContent=S.entries.filter(function(e){return e.type==='read';}).length;
  document.getElementById('tc-bin').textContent=S.deleted.length+S.deletedGroups.length;

  var grp=isBin?null:(S.groups[t]||[]).find(function(g){return g.id===gid;});
  document.getElementById('lt').textContent=isBin?'🗑 Deleted Items':(grp?grp.emoji+' '+grp.name:'All');
  var totalBin=isBin?rows.length+S.deletedGroups.length:rows.length;
  document.getElementById('lc').textContent=totalBin+' item'+(totalBin!==1?'s':'');
  document.getElementById('btn-empty').style.display=(isBin&&(S.deleted.length||S.deletedGroups.length))?'':'none';
  document.getElementById('btn-copy-all').style.display=rows.length&&!isBin?'':'none';

  var el=document.getElementById('list');
  var binGroupsHtml='';
  if(isBin&&S.deletedGroups.length){
    binGroupsHtml='<div style="font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:4px;">Deleted Folders</div>';
    binGroupsHtml+=S.deletedGroups.map(function(dg,i){
      return '<div class="card" style="border-left:3px solid #c8a96e">'
        +'<div class="card-row"><div class="card-body">'
        +'<div class="card-title" style="font-size:14px;">'+dg.group.emoji+' '+esc(dg.group.name)
        +' <span class="card-tag">'+dg.type+'</span>'
        +' <span class="card-tag">'+dg.entries.length+' item'+(dg.entries.length!==1?'s':'')+'</span></div>'
        +'<div class="card-foot"><span class="card-date">deleted '+dg.deletedAt+'</span></div>'
        +'</div>'
        +'<div class="card-acts"><button class="ca grn" data-act="restoregrp" data-idx="'+i+'" title="Restore folder">↩</button></div>'
        +'</div></div>';
    }).join('');
  }
  if(isBin&&!rows.length&&!S.deletedGroups.length){el.innerHTML='<div class="empty">🗑 bin is empty — nothing deleted yet</div>';return;}
  if(!isBin&&!rows.length){el.innerHTML='<div class="empty">nothing here yet — add something above ↑</div>';return;}

  var entriesLabel='';
  if(isBin&&rows.length&&S.deletedGroups.length)entriesLabel='<div style="font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:16px;">Deleted Items</div>';
  el.innerHTML=binGroupsHtml+entriesLabel+rows.map(function(e){
    var ed=!isBin&&ui.editEntry===e.id;
    var titleH=e.link?'<a href="'+esc(e.link)+'" target="_blank" rel="noopener">'+esc(e.title)+'</a>':esc(e.title);
    var urlH=e.link?'<div class="card-url"><a href="'+esc(e.link)+'" target="_blank" rel="noopener">'+esc(trimUrl(e.link))+'</a></div>':'';
    var notesH=e.notes?'<div class="card-notes">'+esc(e.notes)+'</div>':'';
    var tagH='';
    if(!isBin&&isAll){var g2=(S.groups[e.type]||[]).find(function(g){return g.id===e.gid;});if(g2&&g2.id!==defId(e.type))tagH='<span class="card-tag">'+g2.emoji+' '+esc(g2.name)+'</span>';}
    if(isBin)tagH='<span class="card-tag">'+(e.type==='watch'?'📺':'📖')+' '+e.type+'</span>';

    var acts=isBin
      ? '<div class="card-acts"><button class="ca grn" data-act="restore" data-id="'+e.id+'" title="Restore">↩</button></div>'
      : '<div class="card-acts">'
          +'<button class="ca" id="ca-c-'+e.id+'" data-act="copy" data-id="'+e.id+'" title="Copy">📋</button>'
          +'<button class="ca" data-act="edit" data-id="'+e.id+'" title="Edit">✏️</button>'
          +'<button class="ca red" data-act="del" data-id="'+e.id+'" title="Delete">🗑</button>'
          +'</div>';

    var editF=ed?'<div class="card-edit open">'
        +'<div class="eg"><input class="ei" id="ei-t-'+e.id+'" value="'+esc(e.title)+'" placeholder="Title"><input class="ei" id="ei-l-'+e.id+'" value="'+esc(e.link||'')+'" placeholder="https://…" type="url"></div>'
        +'<textarea class="ei" id="ei-n-'+e.id+'">'+esc(e.notes||'')+'</textarea>'
        +'<div class="ef"><button class="btn-cx" data-act="cx">Cancel</button><button class="btn-sv" data-act="sv" data-id="'+e.id+'">Save</button></div>'
        +'</div>':'';

    return '<div class="card" id="card-'+e.id+'">'
      +'<div class="card-row"><div class="card-body">'
      +'<div class="card-title">'+titleH+'</div>'+urlH+notesH
      +'<div class="card-foot"><span class="card-date">'+e.date+'</span>'+(e.deletedAt?'<span class="card-date">deleted '+e.deletedAt+'</span>':'')+tagH+'</div>'
      +'</div>'+acts+'</div>'+editF+'</div>';
  }).join('');

  if(ui.editEntry){var inp=document.getElementById('ei-t-'+ui.editEntry);if(inp){inp.focus();inp.select();}}
}

function renderAll(){renderChips();renderList();}

// ── Events ────────────────────────────────────────────
document.addEventListener('click',function(e){
  if(e.target.closest('#tt-watch')){switchTab('watch');return;}
  if(e.target.closest('#tt-read')) {switchTab('read'); return;}
  if(e.target.closest('#tt-bin'))  {switchTab('bin');  return;}
  if(e.target.id==='btn-add')      {addEntry();return;}
  if(e.target.id==='btn-copy-all') {copyAll();return;}
  if(e.target.id==='btn-empty')    {emptyBin();return;}
  if(e.target.id==='btn-nc')       {ui.newGrp=true;renderChips();return;}

  var a=e.target.closest('[data-act]');if(!a)return;
  var act=a.dataset.act,id=Number(a.dataset.id);
  if(act==='sgrp')   {selGroup(a.dataset.t,a.dataset.id);}
  else if(act==='egrp'){e.stopPropagation();ui.editGrp=a.dataset.id;renderChips();}
  else if(act==='dgrp'){e.stopPropagation();deleteGroup(a.dataset.t,a.dataset.id);}
  else if(act==='copy'){copyEntry(id);}
  else if(act==='edit'){ui.editEntry=(ui.editEntry===id?null:id);renderList();}
  else if(act==='sv') {saveEntry(id);}
  else if(act==='cx') {ui.editEntry=null;renderList();}
  else if(act==='del'){softDelete(id);}
  else if(act==='restore'){restore(id);}
  else if(act==='restoregrp'){restoreGroup(Number(a.dataset.idx));}
});

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&(e.target.id==='f-title'||e.target.id==='f-link'))addEntry();
  if(e.key==='Escape'&&ui.editEntry){ui.editEntry=null;renderList();}
});

loadLocal();renderAll();
</script>
